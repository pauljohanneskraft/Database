name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build DocC
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-docs-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-docs-
            ${{ runner.os }}-spm-

      - name: Generate documentation
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target Database \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path Database \
            --output-path ./docs

      # Redirect the Pages root to the generated documentation entry point.
      - name: Add index redirect
        run: |
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=documentation/database/"></head></html>' > ./docs/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
