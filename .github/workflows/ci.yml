name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-test:
    name: Build, Lint, Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # swift-tools 6.2 needs a Swift 6.2+ toolchain (Xcode 26+); pick the
      # newest stable Xcode the runner has rather than pinning a path.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Lint
        run: swift format lint --strict --recursive Sources Tests Package.swift

      - name: Build
        run: swift build --build-tests

      # Serial: the test harness uses a process-global `chdir` for segment-file
      # placement, so suites are not safe to run in parallel (see TestSupport).
      - name: Test
        run: swift test --no-parallel
